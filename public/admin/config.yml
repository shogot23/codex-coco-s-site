backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "profile"
    label: "プロフィール"
    folder: "src/content/profile"
    create: false
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "説明", name: "description", widget: "string", required: false }
      - { label: "アバター画像", name: "avatar", widget: "image", required: false }
      - { label: "更新日", name: "updatedAt", widget: "datetime", required: false }
      - label: "プロフィール項目"
        name: "profileItems"
        widget: "list"
        required: false
        fields:
          - { label: "ラベル", name: "label", widget: "string" }
          - { label: "値", name: "value", widget: "string" }
      - label: "すきなこと"
        name: "favoriteItems"
        widget: "list"
        required: false
        field: { label: "項目", name: "text", widget: "string" }
      - label: "にがてなこと"
        name: "sensitiveItems"
        widget: "list"
        required: false
        field: { label: "項目", name: "text", widget: "string" }
      - { label: "役割テキスト", name: "roleText", widget: "text", required: false }
      - { label: "引用", name: "closingQuote", widget: "string", required: false }
      - { label: "本文", name: "body", widget: "markdown" }

  - name: "about"
    label: "About"
    folder: "src/content/about"
    create: false
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "説明", name: "description", widget: "string", required: false }
      - { label: "更新日", name: "updatedAt", widget: "datetime", required: false }
      - { label: "本文", name: "body", widget: "markdown" }

  - name: "reviews"
    label: "書評"
    folder: "src/content/reviews"
    create: true
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "記事タイトル", name: "title", widget: "string", required: true, hint: "レビュー記事のタイトル" }
      - { label: "書籍タイトル", name: "bookTitle", widget: "string", required: false, hint: "書籍名（記事タイトルと異なる場合）" }
      - { label: "著者", name: "author", widget: "string", required: false }
      - { label: "公開日", name: "date", widget: "datetime" }
      - { label: "公開する", name: "published", widget: "boolean", required: false, default: true }
      - { label: "説明", name: "description", widget: "text", required: false, hint: "詳細ページやSEOで使う要約" }
      - { label: "抜粋", name: "excerpt", widget: "text", required: false, hint: "一覧カードに出す短い紹介文" }
      - { label: "カバー画像", name: "cover", widget: "image", required: false, hint: "一覧やSNS用。未設定ならインフォグラフィックを使用" }
      - { label: "インフォグラフィック", name: "infographic", widget: "image", required: false, hint: "詳細ページで大きく表示" }
      - label: "タグ"
        name: "tags"
        widget: "select"
        options: ["小説", "青春", "自己理解", "再起", "ビジネス", "自己啓発", "歴史", "科学", "エッセイ", "ノンフィクション", "その他"]
        multiple: true
        required: false
      - label: "おすすめしたい人"
        name: "recommendedFor"
        widget: "list"
        required: false
        field: { label: "項目", name: "text", widget: "string" }
      - { label: "感想本文", name: "body", widget: "markdown" }

  - name: "gallery"
    label: "ギャラリー"
    folder: "src/content/gallery"
    create: true
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "画像", name: "image", widget: "image" }
      - { label: "ジャンル", name: "genre", widget: "select", options: ["現代文学", "歴史小説", "漫画", "ノンフィクション", "歴史教養", "心理学", "健康", "ホビー", "新書", "自伝", "ビジネス", "エッセイ", "社会科学"], required: false }
      - { label: "著者", name: "author", widget: "string", required: false }
      - label: "メモ"
        name: "note"
        widget: "string"
        required: false
        hint: "簡易メモ。説明文が未入力の場合に一覧表示などで代用されます。"
      - { label: "要確認", name: "needs_review", widget: "boolean", required: false, default: false }
      - { label: "自動生成日時", name: "generated_at", widget: "string", required: false }
      - { label: "元画像ファイル", name: "source_file", widget: "string", required: false }
      - { label: "公開状態", name: "published", widget: "boolean", required: false, default: false }
      - label: "説明文"
        name: "description"
        widget: "text"
        required: false
        hint: "詳細ページの説明文・SEO用。未入力の場合は「メモ」が代用されます。"
      - label: "関連書評"
        name: "relatedReview"
        widget: "relation"
        collection: "reviews"
        value_field: "{{slug}}"
        search_fields: ["title"]
        display_fields: ["title"]
        required: false
      - { label: "本文", name: "body", widget: "markdown", required: false }

  - name: "videos"
    label: "動画"
    folder: "src/content/videos"
    create: true
    delete: false
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "日付", name: "date", widget: "datetime" }
      - { label: "サムネイル", name: "thumbnail", widget: "image" }
      - label: "URL (YouTube/Instagram)"
        name: "url"
        widget: "string"
        required: false
        pattern: ['^https://((www\.)?youtube\.com|youtu\.be|(www\.)?instagram\.com)(/.*)?$', "YouTube または Instagram の https URL を入力してください"]
      - { label: "本文", name: "body", widget: "markdown", required: false }
